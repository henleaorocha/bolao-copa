<title>Bolão da Copa 2026 · Design Canvas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  /* tailwind is scoped to ARTBOARD content — not the canvas chrome */
  .artboard-content, .artboard-content * { font-family: 'Montserrat', sans-serif; -webkit-font-smoothing: antialiased; }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }
  .artboard-content *::-webkit-scrollbar { display: none; }
  .artboard-content * { scrollbar-width: none; }
  /* Inside artboards, min-h-screen would use the canvas viewport height (huge) ─
     bind it to the artboard's own box instead. */
  .artboard-content .min-h-screen { min-height: 100% !important; }
  .artboard-content { width: 100%; height: 100%; overflow: hidden; }
  /* mobile artboards scroll vertically */
  .artboard-content.mobile { overflow-y: auto; overflow-x: hidden; }
</style>
</head>
<body>
<div id="root"></div>
